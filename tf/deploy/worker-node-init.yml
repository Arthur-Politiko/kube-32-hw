#cloud-config

# Option 1 - Full installation using cURL
package_update: true
package_upgrade: true

# groups:
#   - docker

system_info:
  default_user:
    name: ubuntu
    groups: [ k8s ]
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - unattended-upgrades
  - python3
  - python3-pip

