#cloud-config

# Option 1 - Full installation using cURL
package_update: true
package_upgrade: true

groups:
  - k8s

system_info:
  default_user:
    name: ubuntu
    groups: [ k8s ]
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    
packages:
  - apt-transport-https
  - ca-certificates
  - curl gnupg
  - lsb-release
  - unattended-upgrades
  - python3 python3-pip

write_files:
  # - path: /home/ubuntu/.ssh/internal_key
  #   content: |
  #     replace(file(${ssh_private_key}), "\n", "\n    ")
  #   permissions: '0600'

  - path: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

runcmd:
  # Disable swap
  - swapoff -a
  - sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
  # Load necessary kernel modules
  - modprobe overlay
  - modprobe br_netfilter

  # Set up sysctl params required by Kubernetes
  # These persist across reboots.
  - mkdir -p /etc/apt/keyrings/
  - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  - echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.32/deb/ /' | sudo tee /etc/apt/sources.list.d/kubernetes.list
  # - echo 1 > /proc/sys/net/ipv4/ip_forward

  # Install containerd
  # - apt-get update
  - apt-get install -y containerd

  # Configure containerd and start the service  
  # - /bin/sh -c 'cat <<EOF | tee /etc/sysctl.d/k8s.conf
  #   net.bridge.bridge-nf-call-iptables  = 1
  #   net.bridge.bridge-nf-call-ip6tables = 1
  #   net.ipv4.ip_forward                 = 1
  #   EOF'
  - sysctl --system
  
  # - systemctl enable containerd

  # Создаем директорию для конфига
  - mkdir -p /etc/containerd
  # Генерируем дефолтный конфиг
  # - containerd config default | sudo tee /etc/containerd/config.toml
  - ['sh', '-c', 'containerd config default | tee /etc/containerd/config.toml']
  # Редактируем файл /etc/containerd/config.toml, ищем строку SystemdCgroup = false и меняем на true
  # - sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
  - ['sh', '-c', 'sed -i "s/SystemdCgroup = false/SystemdCgroup = true/" /etc/containerd/config.toml']
  # Перезапускаем containerd
  - systemctl restart containerd
  - systemctl enable containerd


  # - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  # - echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.32/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list

  - apt-get update
  - apt-get install -y kubelet kubeadm kubectl
  # - apt-mark hold kubelet kubeadm kubectl

  - systemctl enable kubelet

