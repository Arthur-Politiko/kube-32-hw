---
# Плейбук установки Kubernetes на worker-ноды
- name: Install and configure Kubernetes worker nodes
  hosts: workers
  become: true
  gather_facts: true

  vars:
    kubernetes_version: "1.35"
    containerd_version: "1.7"
    cri_socket: "unix:///var/run/containerd/containerd.sock"

  pre_tasks:
