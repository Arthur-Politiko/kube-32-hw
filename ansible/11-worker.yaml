    #   changed_when: false
    #   failed_when: false

    # - name: Show current default gateway
    #   ansible.builtin.debug:
    #     msg: |
    #       Current default gateway on {{ inventory_hostname }}:
    #       {{ current_gateway.stdout | default('No default gateway configured') }}

    # - name: Set default gateway to master node
    #   ansible.builtin.command: ip route replace default via {{ master_private_ip }}
    #   when:
    #     - master_private_ip | default('') != ''
    #     - master_private_ip not in current_gateway.stdout | default('')

    # # Сохранение маршрута в netplan для персистентности после перезагрузки
    # - name: Ensure netplan config directory exists
    #   ansible.builtin.file:
    #     path: /etc/netplan
    #     state: directory
    #     mode: '0755'

    # - name: Find netplan config file
    #   ansible.builtin.find:
    #     paths: /etc/netplan
    #     patterns: '*.yaml'
    #   register: netplan_files
    #   changed_when: false

    # - name: Add default gateway route to netplan config
    #   ansible.builtin.lineinfile:
    #     path: "{{ netplan_files.files[0].path }}"
    #     regexp: '^\s+gateway4:.*'
    #     line: '      gateway4: {{ master_private_ip }}'
    #   when:
    #     - netplan_files.files | length > 0
