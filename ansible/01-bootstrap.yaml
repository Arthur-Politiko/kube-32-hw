- name: Bootstrap system (no Python upgrade needed)
  hosts: master
  become: yes
  gather_facts: yes  #

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          # - python3-apt
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
        state: present